<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="base-text"><span class="num">72</span><span class="txt">시그댄스 룰렛</span></div>
        <div class="base-text"><span class="num">73</span><span class="txt">스키</span></div>
        <div class="base-text"><span class="num">92</span><span class="txt">역도</span></div>

        <div class="divider"></div>

        <a href="https://j-joa.github.io/J-Play/J-Play/Game12/indexC.html" target="_blank" class="base-text on-effect">
            <span class="num">100</span><span class="txt">치킨사다리</span>
        </a>
        
        <div class="base-text on-effect hover-parent">
            <span class="num">172</span><span class="txt">뽑기판</span>
            <div class="hover-menu" id="ppokki-menu">
                <div class="sub-item">1등: 식데 or 배민10</div>
                <div class="sub-item">2등: 치데 or 배민5</div>
                <div class="sub-item">3등: 배민2</div>
                <div class="sub-item" style="text-decoration:underline; cursor:pointer;" onclick="window.open('menu.html', 'M', 'width=600,height=800')">4등: 원하는 리액션</div>
                <div class="sub-item">5등: 안타깝구롱(냠)</div>
            </div>
        </div>

        <a href="https://j-joa.github.io/J-Play/J-Play/Game12/indexP.html" target="_blank" class="base-text on-effect">
            <span class="num">200</span><span class="txt">피자사다리</span>
        </a>

        <div class="base-text"><span class="num">272</span><span class="txt">랜덤상품핀볼</span></div>

        <div class="divider"></div>

        <div class="base-text on-effect" id="t1" style="cursor:pointer;" onclick="toggleSection('time1')">
            <span class="num">77/78</span><span class="txt">시간룰렛</span>
        </div>
        <div id="time1" style="display:none; cursor:pointer;" onclick="closeSection('time1', 't1')">
            <div class="base-text"><span class="num">77</span><span class="txt">시간연장룰렛</span></div>
            <div class="base-text"><span class="num">78</span><span class="txt">시간감소룰렛</span></div>
        </div>

        <div class="base-text on-effect" id="t2" style="cursor:pointer;" onclick="toggleSection('time2')">
            <span class="num">770/780</span><span class="txt">큰시간룰렛</span>
        </div>
        <div id="time2" style="display:none; cursor:pointer;" onclick="closeSection('time2', 't2')">
            <div class="base-text"><span class="num">770</span><span class="txt">슈퍼연장룰렛</span></div>
            <div class="base-text"><span class="num">780</span><span class="txt">슈퍼감소룰렛</span></div>
        </div>
    </div>

<script>
// 기존 토글 기능
function toggleSection(id) {
    const el = document.getElementById(id);
    const title = event.currentTarget;
    if (el.style.display === "none" || el.style.display === "") {
        el.style.display = "block";
        title.style.display = "none";
    }
}
function closeSection(menuId, titleId) {
    const menu = document.getElementById(menuId);
    const title = document.getElementById(titleId);
    menu.style.display = "none";
    title.style.display = "block";
}

// --- 사용자 요청 단축키 통합 관리 ---
window.addEventListener('keydown', (e) => {
    // 채팅 입력 중에는 단축키 무시 (안전장치)
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;

    // 1. [ 키 : 뽑기판 목록 보여주기/숨기기
    if (e.key === '[') {
        e.preventDefault();
        const menu = document.getElementById('ppokki-menu');
        if (menu) {
            const isVisible = window.getComputedStyle(menu).display === 'block';
            menu.style.setProperty('display', isVisible ? 'none' : 'block', 'important');
            menu.style.opacity = '1';
        }
    }

    // 2. ] 키 : 리액션 목록(menu.html) 즉시 실행
    if (e.key === ']') {
        e.preventDefault();
        // 4등 메뉴에 연결된 리액션 정렬 창을 바로 띄웁니다.
        window.open('menu.html', 'M', 'width=600,height=800');
    }
}, true); // 캡처링 단계에서 감지하여 다른 요소의 간섭을 막음
</script>
</body>
</html>
