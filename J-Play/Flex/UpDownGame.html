<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>업다운 게임</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 30px;
    }
    input, button {
      padding: 10px;
      font-size: 16px;
      margin: 5px;
    }
    #result {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
    }
    #chance {
      margin-top: 10px;
      font-size: 18px;
      color: #555;
    }
    #number-buttons {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 5px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }
    .num-btn {
      padding: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    .num-btn:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <h1>업다운 게임 🎯</h1>
  <p>1부터 100 사이의 숫자를 맞춰보세요! (총 5번 기회)</p>

  <input type="number" id="userInput" min="1" max="100" />
  <button id="submitBtn">제출</button>
  <button id="resetBtn">리셋</button>

  <div id="result"></div>
  <div id="chance">남은 기회: 5</div>

  <div id="number-buttons"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      let answer = Math.floor(Math.random() * 100) + 1;
      let tries = 5;
      let gameOver = false;
      let minLimit = 1;
      let maxLimit = 100;

      const userInput = document.getElementById('userInput');
      const result = document.getElementById('result');
      const chance = document.getElementById('chance');
      const numberButtons = document.getElementById('number-buttons');
      const submitBtn = document.getElementById('submitBtn');
      const resetBtn = document.getElementById('resetBtn');

      function createNumberButtons() {
        numberButtons.innerHTML = "";
        for (let i = 1; i <= 100; i++) {
          const btn = document.createElement("button");
          btn.textContent = i;
          btn.classList.add("num-btn");
          btn.id = `btn-${i}`;
          btn.onclick = () => {
            if (!gameOver) {
              userInput.value = i;
              checkNumber();
            }
          };
          numberButtons.appendChild(btn);
        }
      }

      function updateDisabledButtons() {
        for (let i = 1; i <= 100; i++) {
          const btn = document.getElementById(`btn-${i}`);
          if (btn) {
            btn.disabled = i < minLimit || i > maxLimit || gameOver;
          }
        }
      }

      function checkNumber() {
        if (gameOver) return;

        const input = Number(userInput.value);

        if (input < 1 || input > 100 || isNaN(input)) {
          result.textContent = "1부터 100 사이 숫자를 입력하세요!";
          return;
        }

        tries--;

        if (input < answer) {
          result.textContent = "업! 🔼";
          minLimit = Math.max(minLimit, input + 1);
        } else if (input > answer) {
          result.textContent = "다운! 🔽";
          maxLimit = Math.min(maxLimit, input - 1);
        } else {
          result.textContent = `🎉 정답입니다! (${answer})`;
          gameOver = true;
        }

        if (tries === 0 && input !== answer) {
          result.textContent = `❌ 틀렸습니다. 정답은 ${answer}입니다.`;
          gameOver = true;
        }

        chance.textContent = `남은 기회: ${tries}`;
        updateDisabledButtons();
      }

      function resetGame() {
        answer = Math.floor(Math.random() * 100) + 1;
        tries = 5;
        gameOver = false;
        minLimit = 1;
        maxLimit = 100;
        userInput.value = "";
        result.textContent = "";
        chance.textContent = "남은 기회: 5";
        createNumberButtons();
        updateDisabledButtons();
      }

      // 이벤트 등록
      submitBtn.addEventListener('click', checkNumber);
      resetBtn.addEventListener('click', resetGame);
      userInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
          checkNumber();
        }
      });

      // 초기 시작
      createNumberButtons();
      updateDisabledButtons();
    });
  </script>

</body>
</html>
