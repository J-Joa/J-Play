<style>
    /* 썸네일을 담는 상자들 */
    .game-list {
        display: flex;
        flex-wrap: wrap; /* 게임이 많아지면 다음 줄로 넘어감 */
        gap: 30px;
        justify-content: center;
        padding: 50px;
    }

    /* 각 게임 항목 (카드 디자인) */
    .game-card {
        width: 250px; /* 여기서 썸네일 크기를 고정하세요 */
        text-align: center;
        border: 1px solid #444;
        padding: 10px;
        border-radius: 10px;
        transition: transform 0.2s;
    }
    .game-card:hover { transform: scale(1.05); }

    /* 이미지 크기 고정 */
    .game-card img {
        width: 100%;       /* 상자 폭에 꽉 차게 */
        height: 150px;     /* 높이를 고정해야 텍스트가 정렬됨 */
        object-fit: cover; /* 이미지가 찌그러지지 않고 꽉 채워짐 */
        border-radius: 5px;
    }

    /* 텍스트 스타일 */
    .game-card p { margin-top: 10px; font-weight: bold; }
</style>
