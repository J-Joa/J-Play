<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>제이방 미스터리 캡슐머신</title>
    <style>
        :root { --bg: #050505; --gold: #ffd700; --accent: #ff4757; --glass: rgba(255,255,255,0.08); }
        body { background: var(--bg); color: white; font-family: 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; height: 100vh; justify-content: center; }
        
        /* 1. 설정 영역 */
        #setup-area { background: #1a1a1a; padding: 25px; border-radius: 15px; border: 2px solid var(--gold); width: 450px; z-index: 2000; text-align: center; }
        textarea { width: 100%; height: 200px; background: #000; color: #0f0; border: 1px solid #333; padding: 12px; box-sizing: border-box; resize: none; border-radius: 6px; margin-bottom: 15px; }
        .btn-main { width: 100%; padding: 15px; background: linear-gradient(45deg, var(--gold), #b8860b); border: none; font-weight: bold; font-size: 1.3rem; cursor: pointer; border-radius: 8px; color: black; }

        /* 2. 머신 디자인 */
        #machine-wrap { display: none; flex-direction: column; align-items: center; position: relative; width: 1000px; height: 850px; background: #111; border: 15px solid #222; border-radius: 40px; }
        #glass-dome { width: 700px; height: 450px; background: var(--glass); border-radius: 250px 250px 50px 50px; border: 8px solid #333; position: relative; overflow: hidden; margin-top: 30px; }
        .mix-capsule { width: 40px; height: 40px; border-radius: 50%; position: absolute; box-shadow: inset -4px -4px 10px rgba(0,0,0,0.7); }

        /* 3. 캡슐 연출 */
        #result-stage { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .final-capsule { width: 180px; height: 180px; border-radius: 50%; transform: scale(0); transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 100; }
        .final-capsule.active { transform: scale(1) translateY(150px) rotate(1440deg); }
        
        /* 4. ⭐ 결과 팝업 (클릭 시 닫히도록 수정) */
        #result-popup { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5); 
            width: 700px; height: 350px; background: white; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            border-radius: 30px; border: 10px solid var(--gold); 
            z-index: 9999; box-shadow: 0 0 100px rgba(255,215,0,0.5); 
            opacity: 0; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer; /* 클릭할 수 있다는 표시 */
        }
        #result-popup.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        #result-popup p { font-size: 28px; color: #888; margin: 0; font-weight: bold; }
        #winner-name { font-size: 70px; color: black; font-weight: 900; margin: 15px 0; text-align: center; word-break: keep-all; line-height: 1.2; }
        .close-hint { font-size: 18px; color: #bbb; margin-top: 20px; }

        /* 5. 제어부 */
        #action-btn { margin-top: 250px; padding: 20px 80px; font-size: 1.8rem; border-radius: 50px; border: none; background: var(--accent); color: white; cursor: pointer; font-weight: bold; z-index: 100; }
        #action-btn:disabled { background: #444; cursor: default; }
        #status-display { font-size: 1.1rem; color: var(--gold); margin-top: 20px; }
    </style>
</head>
<body>

<div id="setup-area">
    <h2 style="color:var(--gold);">미스터리 캡슐머신</h2>
    <textarea id="inp-list" placeholder="목록을 입력하세요..."></textarea>
    <button class="btn-main" onclick="startMachine()">가동 시작 (목록 자동저장)</button>
</div>

<div id="machine-wrap">
    <div id="status-display">대기 중...</div>
    <div id="glass-dome"></div>
    <div id="result-stage"><div id="final-capsule" class="final-capsule"></div></div>
    <button id="action-btn" onclick="handleAction()">뽑기 시작!</button>
</div>

<div id="result-popup" onclick="closeResult()">
    <p>🎉 축하합니다! 🎉</p>
    <h1 id="winner-name">아이템 이름</h1>
    <div class="close-hint">(어디든 클릭하면 창이 닫힙니다)</div>
</div>

<audio id="aud-roll" src="Sounds/roll.mp3"></audio>
<audio id="aud-drop" src="Sounds/drop.mp3"></audio>
<audio id="aud-open" src="Sounds/open.mp3"></audio>

<script>
    let itemList = [], capsules = [], state = 'READY';
    const capColors = ['#ff4757', '#ffd700', '#00ffcc', '#2ed573', '#1e90ff', '#ffffff'];
    const gravity = 0.6, bounce = 0.5;

    window.onload = () => {
        const saved = localStorage.getItem('jplay_list_v32');
        if(saved) document.getElementById('inp-list').value = saved;
    };

    function startMachine() {
        const txt = document.getElementById('inp-list').value;
        localStorage.setItem('jplay_list_v32', txt);
        itemList = txt.split('\n').map(s => s.trim()).filter(s => s !== "");
        if(itemList.length < 1) return alert("목록을 입력하세요!");
        document.getElementById('setup-area').style.display = 'none';
        document.getElementById('machine-wrap').style.display = 'flex';
        initCapsules();
    }

    function initCapsules() {
        const dome = document.getElementById('glass-dome');
        dome.innerHTML = ''; capsules = [];
        const qty = Math.min(itemList.length, 60);
        for(let i=0; i<qty; i++) {
            const el = document.createElement('div'); el.className = 'mix-capsule';
            el.style.backgroundColor = capColors[Math.floor(Math.random() * capColors.length)];
            dome.appendChild(el);
            capsules.push({ el, x: Math.random()*660, y: Math.random()*300, vx: Math.random()*12-6, vy: Math.random()*12-6, radius: 20 });
        }
        requestAnimationFrame(updatePhysics);
    }

    function updatePhysics() {
        capsules.forEach(cap => {
            cap.vy += gravity; cap.x += cap.vx; cap.y += cap.vy;
            if(cap.y > 410) { cap.y = 410; cap.vy *= -bounce; }
            if(cap.x > 660 || cap.x < 0) { cap.vx *= -bounce; }
            cap.el.style.left = cap.x + 'px'; cap.el.style.top = cap.y + 'px';
        });
        if(state !== 'DONE') requestAnimationFrame(updatePhysics);
    }

    function handleAction() {
        const btn = document.getElementById('action-btn');
        const status = document.getElementById('status-display');
        const finalCap = document.getElementById('final-capsule');

        if(state === 'READY') {
            state = 'MIXING'; btn.disabled = true;
            play('aud-roll');
            capsules.forEach(c => { c.vx = Math.random()*40-20; c.vy = -30; });
            setTimeout(() => {
                state = 'DROPPED';
                finalCap.style.background = `radial-gradient(circle at 30% 30%, #fff, ${capColors[Math.floor(Math.random()*6)]}, #000)`;
                finalCap.classList.add('active');
                play('aud-drop');
                btn.innerText = "결과 확인"; btn.disabled = false;
            }, 3000);
        } else if(state === 'DROPPED') {
            const winner = itemList[Math.floor(Math.random() * itemList.length)];
            document.getElementById('winner-name').innerText = winner;
            play('aud-open');
            const popup = document.getElementById('result-popup');
            popup.style.display = 'flex';
            setTimeout(() => popup.classList.add('show'), 50);
            state = 'DONE';
            btn.innerText = "한 번 더!";
        } else if(state === 'DONE') {
            resetGame();
        }
    }

    // ⭐ 결과창 닫기 함수
    function closeResult() {
        const popup = document.getElementById('result-popup');
        popup.classList.remove('show');
        setTimeout(() => { popup.style.display = 'none'; }, 300);
        resetGame();
    }

    function resetGame() {
        state = 'READY';
        document.getElementById('final-capsule').classList.remove('active');
        document.getElementById('action-btn').innerText = "뽑기 시작!";
        requestAnimationFrame(updatePhysics);
    }

    function play(id) { const a = document.getElementById(id); if(a) { a.currentTime = 0; a.play().catch(()=>{}); } }
</script>
</body>
</html>
