<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>제이방 폭탄 돌리기 - game4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-wrap">
        <div id="game-container">
            <div id="game-board">
                <img src="dynamite_idle.png" id="dynamite-img">
                <img src="explosion.png" id="explosion-img">
                
                <div id="counter-display">0</div>
                <div id="status-message">⚙️ 아이콘을 눌러 참가자를 등록하세요!</div>
                
                <div id="current-player-display">차례: <span id="player-name">-</span></div>

                <div id="settings-panel">
                    <label>벌칙 숫자 (미입력시 20~80 랜덤)</label>
                    <input type="number" id="target-input" placeholder="예: 31">
                    <label>참가자 명단 (줄바꿈으로 구분)</label>
                    <textarea id="player-list-input" placeholder="시청자 이름을 적어주세요"></textarea>
                    <div class="settings-btns">
                        <button onclick="shufflePlayers()">순서 섞기</button>
                        <button onclick="saveSettings()">설정 저장</button>
                    </div>
                </div>
                <div id="settings-icon" onclick="toggleSettings()">⚙️</div>
            </div>

            <div id="control-panel">
                <div class="btn-group">
                    <button onclick="addCount(1)" class="game-btn"><img src="btn_plus1.png"><span>1</span></button>
                    <button onclick="addCount(2)" class="game-btn"><img src="btn_plus1.png"><span>2</span></button>
                    <button onclick="addCount(3)" class="game-btn"><img src="btn_plus1.png"><span>3</span></button>
                </div>
                <button id="start-btn" onclick="startGame()">새 게임 시작</button>
            </div>
        </div>

        <div id="player-board">
            <h3>참가자 명단</h3>
            <div id="list-container">
                <ul id="player-ul"></ul>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
