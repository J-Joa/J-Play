<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>추억의 뽑기판 v4.0 (사운드&팝업)</title>
    <style>
        :root { --paper-bg: #fdf6e3; --board-border: #8b4513; --accent: #d63031; --blue: #0984e3; --gray: #636e72; }
        body { font-family: 'Pretendard', sans-serif; background: #e0d5c1; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; min-height: 100vh; overflow-x: hidden; }
        
        /* 관리자 패널 */
        .admin-panel { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; width: 95%; max-width: 1200px; }
        .setup-row { display: flex; gap: 15px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .prize-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
        .prize-item { display: flex; flex-direction: column; font-size: 0.8rem; background: #f9f9f9; padding: 8px; border-radius: 6px; border: 1px solid #eee; }
        .prize-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .rem-count { color: var(--accent); font-weight: bold; font-size: 0.85rem; }
        .input-group { display: flex; gap: 5px; }
        .prize-item input { padding: 5px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.85rem; }
        .name-input { flex: 1; }
        .count-input { width: 50px; font-weight: bold; color: var(--blue); text-align: center; }

        /* 메인 레이아웃 */
        .main-layout { display: flex; gap: 15px; width: 98%; max-width: 1400px; align-items: flex-start; flex-wrap: wrap; }
        .board-card { flex: 3; min-width: 600px; background: var(--paper-bg); padding: 20px; border: 6px solid var(--board-border); border-radius: 5px; box-shadow: 6px 6px 0px rgba(0,0,0,0.1); text-align: center; }
        #board-grid { display: grid; gap: 4px; margin-top: 10px; padding: 5px; background: rgba(0,0,0,0.03); border-radius: 4px; }
        .paper-btn { aspect-ratio: 1; border: 1px solid #ccc; background: #fff; cursor: pointer; font-size: 0.7rem; font-weight: bold; color: #777; transition: 0.1s; border-radius: 2px; padding: 0; position: relative; overflow: hidden; }
        .paper-btn:hover:not(:disabled) { background: #fff5f5; border-color: var(--accent); transform: scale(1.1); z-index: 2; }
        .paper-btn.opened { background: #e9ecef !important; color: var(--accent) !important; border: 1px solid #bbb; cursor: default; }

        /* 애니메이션 효과 (뜯는 느낌) */
        .paper-btn::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, transparent 50%, rgba(0,0,0,0.05) 50%, transparent 55%); transition: 0.3s; transform: translateX(-100%); }
        .paper-btn:not(:disabled):active::after { transform: translateX(100%); }

        .status-bar { display: grid; grid-template-columns: repeat(5, 1fr); background: var(--board-border); color: white; padding: 10px; border-radius: 4px; margin-bottom: 10px; font-size: 0.85rem; font-weight: bold; }
        
        /* 로그 영역 */
        .history-log { flex: 1; min-width: 300px; background: white; padding: 15px; border-radius: 10px; border-top: 5px solid var(--board-border); box-shadow: 4px 4px 10px rgba(0,0,0,0.05); position: sticky; top: 10px; height: 85vh; display: flex; flex-direction: column; }
        #log-container { flex: 1; overflow-y: auto; font-size: 0.85rem; text-align: left; scroll-behavior: smooth; }
        .log-entry { padding: 6px 0; border-bottom: 1px dashed #eee; line-height: 1.4; animation: fadeInLog 0.3s; }
        @keyframes fadeInLog { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .main-btn { padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 0.9rem; transition: 0.2s; }
        .main-btn:hover { background: #b32424; transform: translateY(-2px); }

        /* 🎉 당첨 결과창 팝업 스타일 */
        .result-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; visibility: hidden; transition: 0.3s; backdrop-filter: blur(5px); }
        .result-overlay.active { opacity: 1; visibility: visible; }
        .result-modal { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); transform: scale(0.7); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; border: 5px solid var(--accent); }
        .result-overlay.active .result-modal { transform: scale(1); }
        
        .confetti { position: absolute; width: 10px; height: 10px; background: var(--accent); border-radius: 50%; animation: confettiRain 1s ease-out infinite; opacity: 0; }
        @keyframes confettiRain { 0% { opacity: 1; transform: translateY(0) rotate(0deg); } 100% { opacity: 0; transform: translateY(100px) rotate(360deg); } }

        .result-rank { font-size: 5rem; font-weight: 900; color: var(--accent); margin: 0; line-height: 1; text-shadow: 2px 2px 0px #fff, 4px 4px 0px rgba(0,0,0,0.1); }
        .result-prize { font-size: 1.5rem; font-weight: bold; color: #333; margin: 15px 0 30px 0; padding: 10px; background: #fff5f5; border-radius: 8px; }
        .close-modal-btn { padding: 12px 30px; background: #333; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1rem; transition: 0.2s; }
        .close-modal-btn:hover { background: #000; transform: scale(1.05); }
    </style>
</head>
<body>

<audio id="sndWinBig" src="win_big.mp3" preload="auto"></audio>
<audio id="sndWinSmall" src="win_small.mp3" preload="auto"></audio>
<audio id="sndClick" src="click.mp3" preload="auto"></audio>

<div class="result-overlay" id="resultOverlay">
    <div class="result-modal">
        <div class="confetti" style="left:10%; background:#ff4757; animation-delay:0.1s;"></div>
        <div class="confetti" style="left:30%; background:#2ed573; animation-delay:0.3s;"></div>
        <div class="confetti" style="left:50%; background:#1e90ff; animation-delay:0.2s;"></div>
        <div class="confetti" style="left:70%; background:#ffa502; animation-delay:0.4s;"></div>
        <div class="confetti" style="left:90%; background:#5352ed; animation-delay:0.1s;"></div>
        
        <p style="font-size:1.2rem; color:#666; margin:0;">🎊 축하합니다! 🎊</p>
        <h1 class="result-rank" id="popupRank">1등</h1>
        <div class="result-prize" id="popupPrize">치킨 세트</div>
        <button class="close-modal-btn" onclick="closeResultModal()">확인 (Enter)</button>
    </div>
</div>

<div class="admin-panel">
    <div class="setup-row">
        <div><b>전체 칸:</b> <input type="number" id="totalCount" value="300" min="50" max="800"></div>
        <button class="main-btn" onclick="confirmInit()">♻️ 설정 저장 및 새 판 짜기</button>
    </div>
    <div class="prize-inputs">
        <div class="prize-item">
            <div class="prize-header"><span>1등 상품 / 설정개수</span> <span class="rem-count" id="rem1">남은: 0</span></div>
            <div class="input-group"><input type="text" id="p1" class="name-input" value="치킨 세트"> <input type="number" id="c1" class="count-input" value="1"></div>
        </div>
        <div class="prize-item">
            <div class="prize-header"><span>2등 상품 / 설정개수</span> <span class="rem-count" id="rem2">남은: 0</span></div>
            <div class="input-group"><input type="text" id="p2" class="name-input" value="피자 세트"> <input type="number" id="c2" class="count-input" value="3"></div>
        </div>
        <div class="prize-item">
            <div class="prize-header"><span>3등 상품 / 설정개수</span> <span class="rem-count" id="rem3">남은: 0</span></div>
            <div class="input-group"><input type="text" id="p3" class="name-input" value="편의점 만원"> <input type="number" id="c3" class="count-input" value="5"></div>
        </div>
        <div class="prize-item">
            <div class="prize-header"><span>4등 상품 / 설정개수</span> <span class="rem-count" id="rem4">남은: 0</span></div>
            <div class="input-group"><input type="text" id="p4" class="name-input" value="별사탕"> <input type="number" id="c4" class="count-input" value="10"></div>
        </div>
        <div class="prize-item">
            <div class="prize-header"><span>5등 상품 (나머지 전체)</span> <span class="rem-count" id="rem5">남은: 0</span></div>
            <input type="text" id="p5" value="다음 기회에..">
        </div>
    </div>
</div>

<div class="main-layout">
    <div class="board-card">
        <div class="status-bar" id="statusDisplay"></div>
        <div id="board-grid"></div>
    </div>
    <div class="history-log">
        <h3 style="margin:0 0 10px 0; font-size:1rem;">📜 최근 뽑기 기록</h3>
        <div id="log-container"></div>
    </div>
</div>

<script>
    let state = { board: [], prizeNames: {}, setCounts: {}, curCounts: {}, opened: {}, logs: [] };
    const sounds = {
        big: document.getElementById('sndWinBig'),
        small: document.getElementById('sndWinSmall'),
        click: document.getElementById('sndClick')
    };

    // 사운드 재생 함수 (중복 재생 방지 및 처음부터 재생)
    function playSound(audioObj) {
        if(!audioObj) return;
        audioObj.pause();
        audioObj.currentTime = 0;
        // 브라우저 정책상 사용자 상호작용 후 재생 가능 (첫 클릭 후부터 정상 작동)
        audioObj.play().catch(e => console.log("사운드 재생 실패 (브라우저 정책):", e));
    }

    function confirmInit() {
        if (confirm("새로운 설정으로 판을 다시 짭니다. 현재 데이터는 사라집니다.")) initBoard();
    }

    function initBoard() {
        playSound(sounds.click); // 리셋 옴
        const total = parseInt(document.getElementById('totalCount').value);
        state = { board: [], prizeNames: {}, setCounts: {}, curCounts: {}, opened: {}, logs: [] };
        
        let assigned = 0;
        for(let i=1; i<=4; i++) {
            state.prizeNames[i] = document.getElementById('p'+i).value;
            state.setCounts[i] = parseInt(document.getElementById('c'+i).value) || 0;
            state.curCounts[i] = state.setCounts[i];
            assigned += state.curCounts[i];
            for(let j=0; j<state.curCounts[i]; j++) state.board.push(i);
        }
        state.prizeNames[5] = document.getElementById('p5').value;
        state.curCounts[5] = total - assigned;
        state.setCounts[5] = state.curCounts[5];
        if(state.curCounts[5] < 0) { alert("당첨 개수 합이 전체 칸보다 많습니다!"); return; }
        for(let j=0; j<state.curCounts[5]; j++) state.board.push(5);

        for (let i = state.board.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [state.board[i], state.board[j]] = [state.board[j], state.board[i]];
        }
        saveAndRender();
    }

    function openPaper(idx) {
        if(state.opened[idx]) return;
        const res = state.board[idx];
        
        // 사운드 처리
        if(res === 1 || res === 2) playSound(sounds.big);
        else if(res === 3 || res === 4) playSound(sounds.small);
        else playSound(sounds.click); // 5등 및 일반

        state.opened[idx] = true;
        state.curCounts[res]--;

        const time = new Date().toLocaleTimeString('ko-KR', {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'});
        state.logs.push({ time, idx: idx+1, res, prize: state.prizeNames[res] });
        
        saveAndRender();

        // 1~4등 당첨시 결과 팝업 표시
        if(res >= 1 && res <= 4) {
            setTimeout(() => showResultModal(res, state.prizeNames[res]), 300); // 사운드와 약간의 시차
        }
    }

    // 🎉 당첨 결과 모달 표시
    function showResultModal(rank, prize) {
        document.getElementById('popupRank').innerText = rank + "등";
        document.getElementById('popupPrize').innerText = prize;
        document.getElementById('resultOverlay').classList.add('active');
        
        // Enter 키로 모달 닫기 이벤트 등록
        window.addEventListener('keydown', modalKeyHandler);
    }

    function closeResultModal() {
        playSound(sounds.click);
        document.getElementById('resultOverlay').classList.remove('active');
        window.removeEventListener('keydown', modalKeyHandler);
    }

    function modalKeyHandler(e) {
        if(e.key === 'Enter') closeResultModal();
    }

    function saveAndRender() {
        try {
            localStorage.setItem('lucky_draw_state_v4_0', JSON.stringify(state));
        } catch (e) { console.warn("로컬 스토리지 저장 실패 (용량 초과 등):", e); }
        render();
    }

    function render() {
        const grid = document.getElementById('board-grid');
        const logBox = document.getElementById('log-container');
        const total = state.board.length;
        grid.innerHTML = "";
        logBox.innerHTML = "";

        for(let i=1; i<=5; i++) {
            document.getElementById('rem'+i).innerText = `남은: ${state.curCounts[i]}`;
        }

        const btnSize = total > 400 ? '28px' : '35px';
        grid.style.gridTemplateColumns = `repeat(auto-fill, minmax(${btnSize}, 1fr))`;

        state.board.forEach((res, i) => {
            const btn = document.createElement('button');
            btn.className = 'paper-btn' + (state.opened[i] ? ' opened' : '');
            btn.style.minWidth = btnSize;
            btn.innerText = state.opened[i] ? res : i + 1;
            btn.disabled = state.opened[i];
            btn.onclick = () => openPaper(i);
            grid.appendChild(btn);
        });

        document.getElementById('statusDisplay').innerHTML = [1,2,3,4,5].map(i => `<div>${i}등: ${state.curCounts[i]}</div>`).join('');
        
        // 로그 가독성 및 애니메이션
        [...state.logs].reverse().forEach(l => {
            const isWin = l.res < 5;
            logBox.insertAdjacentHTML('beforeend', `
                <div class="log-entry" style="${isWin ? 'background:#fff5f5; border-radius:4px; padding:4px;' : ''}">
                    <small>[${l.time}]</small> <b>${l.idx}번</b> 👉 <span style="color:${isWin ? 'var(--accent)' : '#777'}; font-weight:bold;">${l.res}등</span>
                    <span style="font-size:0.75rem; color:#666; display:block; margin-left:50px;">(${l.prize})</span>
                </div>
            `);
        });
        // 로그 최신 항목으로 스크롤 (render시 자동 스크롤)
        logBox.scrollTop = 0;
    }

    window.onload = () => {
        // 첫 사운드 재생 시도 (브라우저 정책 우회용 가짜 재생)
        document.body.addEventListener('click', function unlockSounds() {
            sounds.click.play().then(()=> sounds.click.pause()).catch(()=>{});
            document.body.removeEventListener('click', unlockSounds);
        }, { once: true });

        const saved = localStorage.getItem('lucky_draw_state_v4_0');
        if (saved) {
            state = JSON.parse(saved);
            document.getElementById('totalCount').value = state.board.length;
            for(let i=1; i<=4; i++) {
                document.getElementById('p'+i).value = state.prizeNames[i];
                document.getElementById('c'+i).value = state.setCounts[i] || state.curCounts[i];
            }
            document.getElementById('p5').value = state.prizeNames[5];
            render();
        } else {
            initBoard();
        }
    };
</script>
</body>
</html>
