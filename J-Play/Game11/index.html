<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>추억의 문방구 뽑기 v5.2</title>
    <style>
        :root { 
            --board-yellow: #FCDD11; 
            --accent: #d63031; 
            --blue: #0984e3; 
        }
        body { font-family: 'Pretendard', sans-serif; background: #222; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; min-height: 100vh; }
        
        /* 관리자 패널 (기존 동일) */
        .admin-panel { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 15px; width: 95%; max-width: 1200px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .setup-row { display: flex; gap: 15px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .prize-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
        .prize-item { display: flex; flex-direction: column; font-size: 0.8rem; background: #f9f9f9; padding: 8px; border-radius: 6px; border: 1px solid #eee; }
        .rem-count { color: var(--accent); font-weight: bold; }
        .input-group { display: flex; gap: 5px; margin-top: 5px; }
        .prize-item input { padding: 5px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.85rem; width: 100%; }
        .count-input { width: 60px !important; text-align: center; font-weight: bold; color: var(--blue); }

        /* 메인 레이아웃 */
        .main-layout { display: flex; gap: 20px; width: 98%; max-width: 1400px; align-items: flex-start; }

        /* ⭐️ 뽑기판 디자인 핵심 수정 부분 ⭐️ */
        .board-container { 
            flex: 3; background-color: var(--board-yellow); 
            padding: 0; border: 6px solid #000; border-radius: 8px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); overflow: hidden;
        }
        .board-header-img { width: 100%; display: block; border-bottom: 3px solid #000; }
        
        #board-grid { 
            display: grid; 
            grid-template-columns: repeat(20, 1fr); /* 20열 고정 */
            
            /* 좌우 간격은 미세하게 두고, 위아래 간격만 완전히 제거 */
            column-gap: 3px; 
            row-gap: 0; /* ⭐️ 위아래 노란색 안보이게 붙임 */
            
            padding: 15px; /* 테두리 안쪽 여백 */
            background-color: var(--board-yellow); /* 판 배경은 노란색 */
        }
        
        .paper-btn { 
            aspect-ratio: 1; border: none;
            background-image: url('btn_star.png'); /* 파란색 별 버튼 */
            background-size: cover; background-position: center;
            background-color: transparent;
            cursor: pointer; transition: 0.05s; padding: 0;
            border-radius: 0; /* 촘촘하게 붙도록 둥근 테두리 제거 */
        }
        /* 위아래가 딱 붙었으므로 호버 효과는 크기 조절 대신 테두리 강조로 변경 */
        .paper-btn:hover:not(:disabled) { 
            z-index: 2; 
            box-shadow: 0 0 8px rgba(255,255,255,0.7);
            filter: brightness(1.15);
        }
        
        /* 뜯겼을 때 효과: 이미지가 사라지고 노란색 배경이 보임 */
        .paper-btn.opened { 
            background-image: none !important; 
            background-color: transparent; /* 이미지가 투명해지며 판의 노란 배경이 보임 */
            border: 1px solid rgba(0,0,0,0.1); /* 뜯긴 자국 표현 */
            font-size: 0.8rem; font-weight: bold; color: rgba(0,0,0,0.6);
            display: flex; justify-content: center; align-items: center;
            cursor: default; 
            aspect-ratio: 1; /* 크기 유지 */
        }

        /* 기록 창 (기존 동일) */
        .history-log { flex: 1; min-width: 300px; background: white; padding: 15px; border-radius: 10px; height: 85vh; display: flex; flex-direction: column; box-shadow: 4px 4px 15px rgba(0,0,0,0.2); }
        #log-container { flex: 1; overflow-y: auto; font-size: 0.85rem; }
        .log-entry { padding: 6px 0; border-bottom: 1px dashed #eee; }

        /* 결과 팝업 (기존 동일) */
        .result-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:flex; justify-content:center; align-items:center; z-index:2000; visibility:hidden; opacity:0; transition:0.3s; backdrop-filter: blur(3px); }
        .result-overlay.active { visibility:visible; opacity:1; }
        .result-modal { background:white; padding:40px; border-radius:24px; text-align:center; border:10px solid var(--board-yellow); box-shadow: 0 0 30px rgba(255,255,255,0.2); }
        
        .main-btn { padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .main-btn:hover { background: #b32424; }
    </style>
</head>
<body>

<audio id="sndWinBig" src="win_big.mp3" preload="auto"></audio>
<audio id="sndWinSmall" src="win_small.mp3" preload="auto"></audio>
<audio id="sndClick" src="click.mp3" preload="auto"></audio>

<div class="result-overlay" id="resultOverlay">
    <div class="result-modal">
        <h2 style="margin:0; color:#888;">🎉 축하합니다! 🎉</h2>
        <h1 id="popupRank" style="font-size:5.5rem; color:var(--accent); margin:10px 0;">1등</h1>
        <div id="popupPrize" style="font-size:1.7rem; font-weight:bold; background:#fff9db; padding:20px; border-radius:15px;">치킨</div>
        <button class="main-btn" style="margin-top:25px; width:100%; height:50px;" onclick="closeResultModal()">확인 (Enter)</button>
    </div>
</div>

<div class="admin-panel">
    <div class="setup-row">
        <b>총 칸수:</b> <input type="number" id="totalCount" value="300" style="width:60px; padding:5px; border-radius:4px; border:1px solid #ccc;">
        <button class="main-btn" onclick="confirmInit()">♻️ 새 판 짜기</button>
        <small style="margin-left:15px; color:#777;">* 상품명과 개수를 수정 후 버튼을 눌러주세요.</small>
    </div>
    <div class="prize-inputs" id="prizeInputArea">
        </div>
</div>

<div class="main-layout">
    <div class="board-container">
        <img src="board_header.png" class="board-header-img">
        <div id="board-grid"></div>
    </div>
    
    <div class="history-log">
        <h3 style="margin-top:0; border-bottom: 2px solid #eee; padding-bottom: 10px;">📜 당첨 히스토리</h3>
        <div id="log-container"></div>
    </div>
</div>

<script>
    let state = { board: [], prizeNames: {}, setCounts: {}, curCounts: {}, opened: {}, logs: [] };
    const sounds = { big: document.getElementById('sndWinBig'), small: document.getElementById('sndWinSmall'), click: document.getElementById('sndClick') };

    // 입력창 동적 생성 로직 (기존 동일)
    const inputArea = document.getElementById('prizeInputArea');
    for(let i=1; i<=5; i++) {
        inputArea.innerHTML += `
        <div class="prize-item">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <b>${i}등</b> <span class="rem-count" id="rem${i}">남은: 0</span>
            </div>
            <div class="input-group">
                <input type="text" id="p${i}" value="${i}등 상품">
                ${i < 5 ? `<input type="number" id="c${i}" class="count-input" value="${11-i*2}">` : ''}
            </div>
        </div>`;
    }

    // 기본 기능 함수 (기존 동일)
    function playSound(s) { s.pause(); s.currentTime = 0; s.play().catch(()=>{}); }
    function confirmInit() { if(confirm("현재 진행 상태가 초기화됩니다. 계속하시겠습니까?")) initBoard(); }

    function initBoard() {
        const total = parseInt(document.getElementById('totalCount').value);
        state = { board: [], prizeNames: {}, setCounts: {}, curCounts: {}, opened: {}, logs: [] };
        let assigned = 0;
        for(let i=1; i<=4; i++) {
            state.prizeNames[i] = document.getElementById('p'+i).value;
            state.setCounts[i] = parseInt(document.getElementById('c'+i).value) || 0;
            state.curCounts[i] = state.setCounts[i];
            assigned += state.curCounts[i];
            for(let j=0; j<state.curCounts[i]; j++) state.board.push(i);
        }
        state.prizeNames[5] = document.getElementById('p5').value;
        state.curCounts[5] = total - assigned;
        state.setCounts[5] = state.curCounts[5];
        for(let j=0; j<state.curCounts[5]; j++) state.board.push(5);
        for (let i = state.board.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [state.board[i], state.board[j]] = [state.board[j], state.board[i]];
        }
        saveAndRender();
    }

    function openPaper(idx) {
        if(state.opened[idx]) return;
        const res = state.board[idx];
        state.opened[idx] = true;
        state.curCounts[res]--;
        if(res <= 2) playSound(sounds.big);
        else if(res <= 4) playSound(sounds.small);
        else playSound(sounds.click);
        const time = new Date().toLocaleTimeString('ko-KR', {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'});
        state.logs.push({ time, idx: idx+1, res, prize: state.prizeNames[res] });
        saveAndRender();
        if(res <= 4) showResultModal(res, state.prizeNames[res]);
    }

    function showResultModal(rank, prize) {
        document.getElementById('popupRank').innerText = rank + "등";
        document.getElementById('popupPrize').innerText = prize;
        document.getElementById('resultOverlay').classList.add('active');
        window.addEventListener('keydown', (e) => { if(e.key === 'Enter') closeResultModal(); }, {once:true});
    }

    function closeResultModal() { document.getElementById('resultOverlay').classList.remove('active'); }

    function saveAndRender() {
        localStorage.setItem('lucky_draw_v5_2', JSON.stringify(state));
        render();
    }

    function render() {
        const grid = document.getElementById('board-grid');
        const logBox = document.getElementById('log-container');
        grid.innerHTML = ""; logBox.innerHTML = "";
        for(let i=1; i<=5; i++) document.getElementById('rem'+i).innerText = `남은: ${state.curCounts[i]}`;
        state.board.forEach((res, i) => {
            const btn = document.createElement('button');
            btn.className = 'paper-btn' + (state.opened[i] ? ' opened' : '');
            if(state.opened[i]) btn.innerText = res;
            btn.disabled = state.opened[i];
            btn.onclick = () => openPaper(i);
            grid.appendChild(btn);
        });
        [...state.logs].reverse().forEach(l => {
            const isWin = l.res < 5;
            logBox.insertAdjacentHTML('beforeend', `
                <div class="log-entry" style="${isWin ? 'background:#fff5f5; border-radius:6px; padding:8px; margin-bottom:5px; border:1px solid #ffebeb;' : ''}">
                    <b>[${l.time}]</b> <span style="font-size:1.1rem; margin:0 5px;">${l.idx}번</span> 👉 <span style="color:${isWin?'red':'#555'}; font-weight:bold;">${l.res}등</span><br><small style="color:#888;">(${l.prize})</small>
                </div>`);
        });
    }

    window.onload = () => {
        const saved = localStorage.getItem('lucky_draw_v5_2');
        if(saved) {
            state = JSON.parse(saved);
            document.getElementById('totalCount').value = state.board.length;
            for(let i=1; i<=5; i++) document.getElementById('p'+i).value = state.prizeNames[i];
            for(let i=1; i<=4; i++) if(document.getElementById('c'+i)) document.getElementById('c'+i).value = state.setCounts[i];
            render();
        } else { initBoard(); }
    };
</script>
</body>
</html>
